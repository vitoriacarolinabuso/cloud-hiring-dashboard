<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Hiring — Status Semanal | Sankhya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0B1F35 0%, #1a2f4a 100%);
            color: #fff;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            border-bottom: 2px solid rgba(0, 169, 157, 0.3);
            padding-bottom: 1.5rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .header-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: #b0b8c1;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.priority {
            background: rgba(255, 87, 51, 0.15);
            color: #FF5733;
        }

        .badge.momentum {
            background: rgba(0, 169, 157, 0.15);
            color: #00A99D;
        }

        .badge.health {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
        }

        /* Main grid sections */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 169, 157, 0.2);
        }

        /* Posições Grid */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .position-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 169, 157, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .position-card:hover {
            border-color: rgba(0, 169, 157, 0.5);
            background: rgba(255, 255, 255, 0.12);
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .position-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
        }

        .position-number {
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .health-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .health-indicator.green {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .health-indicator.yellow {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }

        .health-indicator.red {
            background: rgba(255, 87, 51, 0.2);
            color: #FF5733;
        }

        .position-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(0, 169, 157, 0.1);
            border-bottom: 1px solid rgba(0, 169, 157, 0.1);
        }

        .meta-item {
            font-size: 0.85rem;
        }

        .meta-label {
            color: #888;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .meta-value {
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .position-context {
            background: rgba(0, 169, 157, 0.08);
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid #00A99D;
            margin-bottom: 1rem;
        }

        .position-context label {
            display: block;
            font-size: 0.7rem;
            color: #00A99D;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .position-context p {
            font-size: 0.85rem;
            color: #b0b8c1;
            line-height: 1.4;
        }

        /* Desafios */
        .challenges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .challenge-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 87, 51, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .challenge-card.warning {
            border-color: rgba(255, 193, 7, 0.3);
        }

        .challenge-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .challenge-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .challenge-title {
            font-weight: 700;
            color: #fff;
            font-size: 0.95rem;
        }

        .challenge-context {
            font-size: 0.85rem;
            color: #b0b8c1;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .challenge-action {
            background: rgba(0, 169, 157, 0.1);
            padding: 0.8rem;
            border-radius: 6px;
            border-left: 3px solid #00A99D;
        }

        .action-label {
            font-size: 0.7rem;
            color: #00A99D;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .action-text {
            font-size: 0.85rem;
            color: #fff;
            font-weight: 500;
        }

        .action-meta {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.4rem;
        }

        /* Last updated */
        .last-updated {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 169, 157, 0.2);
            color: #888;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .header-meta {
                flex-direction: column;
                gap: 0.8rem;
            }

            .positions-grid,
            .challenges-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-top">
                <div>
                    <h1>🚀 Cloud Hiring — Status Semanal</h1>
                    <div class="header-meta" id="headerDate"></div>
                </div>
            </div>
        </header>

        <!-- Posições -->
        <section class="section">
            <h2 class="section-title">📋 Posições — Status Detalhado</h2>
            <div class="positions-grid" id="positionsGrid">
                <!-- Posições carregadas via JavaScript -->
            </div>
        </section>

        <!-- Decisões Pendentes -->
        <section class="section" id="decisionsSection">
            <h2 class="section-title">🔴 Decisões Pendentes</h2>
            <div class="challenges-grid" id="decisionsGrid">
                <!-- Decisões carregadas via JavaScript -->
            </div>
        </section>

        <!-- Last updated -->
        <div class="last-updated" id="lastUpdated">
            Última atualização: Carregando...
        </div>
    </div>

    <script>
        const dashboardData = {
            lastUpdated: new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            positions: [
                {
                    number: "5775",
                    title: "DBA Specialist",
                    stage: "SankherUP",
                    recruiter: "Natalia Kelly Aguiar",
                    leader: "Charles",
                    pipeline: "2 ativos | 1 em SankherUP + 1 em entrevista Talent hoje",
                    nextStep: "Se aprovado em SankherUP, iniciar proposta com Rodrigo",
                    health: "yellow",
                    risk: null
                },
                {
                    number: "5741",
                    title: "Desenvolvedor Java Pleno — Platform Engineering",
                    stage: "Agendamento de avaliação técnica",
                    recruiter: "Vitória Carolina Buso",
                    leader: "Wender",
                    pipeline: "6 ativos | 2 aprovados por Talent, agendamento técnico em marcha",
                    nextStep: "Agendar entrevista técnica com 2 candidatos aprovados por Talent",
                    health: "yellow",
                    risk: null
                },
                {
                    number: "5774",
                    title: "Analista de Infraestrutura Cloud II",
                    stage: "Aguardando liberação orçamentária",
                    recruiter: "Ketlin Sales Pereira",
                    leader: "Charles",
                    pipeline: "Ainda não iniciado | Sourcing aguarda desbloqueio",
                    nextStep: "Alinhamento da vaga com liderança (Charles) após liberação orçamentária",
                    health: "red",
                    risk: "Processo paralisado até liberação orçamentária pelo Financeiro"
                }
            ],
            decisions: [
                {
                    title: "Analista de Infraestrutura Cloud II — Desbloqueio orçamentário",
                    context: "Mudança de senioridade Junior→Pleno requer aprovação de investimento. Sem aprovação, sourcing ativo não inicia.",
                    action: "Liberar orçamento para elevação de senioridade (Junior→Pleno)",
                    responsible: "Financeiro"
                }
            ]
        };

        function renderPositions() {
            const grid = document.getElementById('positionsGrid');
            grid.innerHTML = dashboardData.positions.map(pos => {
                let riskHTML = '';
                if (pos.risk) {
                    riskHTML = `
                        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(0, 169, 157, 0.1);">
                            <div style="font-size: 0.7rem; color: #FF5733; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 0.3rem;">⚠ Risco</div>
                            <div style="font-size: 0.85rem; color: #FF5733;">${pos.risk}</div>
                        </div>
                    `;
                }

                return `
                    <div class="position-card">
                        <div class="position-number">#${pos.number}</div>
                        <div class="position-header">
                            <div class="position-title">${pos.title}</div>
                            <div class="health-indicator ${pos.health}">
                                ${pos.health === 'green' ? '🟢' : pos.health === 'yellow' ? '🟡' : '🔴'}
                                ${pos.health === 'green' ? 'Iniciando' : pos.health === 'yellow' ? 'Em aceleração' : 'Bloqueado'}
                            </div>
                        </div>
                        <div class="position-meta">
                            <div class="meta-item">
                                <div class="meta-label">Estágio</div>
                                <div class="meta-value">${pos.stage}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Recrutadora</div>
                                <div class="meta-value">${pos.recruiter}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Líder</div>
                                <div class="meta-value">${pos.leader}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Pipeline</div>
                                <div class="meta-value">${pos.pipeline}</div>
                            </div>
                        </div>
                        <div class="position-context">
                            <label>➡ Próximo passo</label>
                            <p>${pos.nextStep}</p>
                        </div>
                        ${riskHTML}
                    </div>
                `;
            }).join('');
        }

        function renderDecisions() {
            const section = document.getElementById('decisionsSection');
            const grid = document.getElementById('decisionsGrid');
            
            if (dashboardData.decisions.length === 0) {
                section.style.display = 'none';
                return;
            }

            grid.innerHTML = dashboardData.decisions.map(dec => `
                <div class="challenge-card">
                    <div class="challenge-header">
                        <div class="challenge-icon">🔴</div>
                        <div class="challenge-title">${dec.title}</div>
                    </div>
                    <div class="challenge-context">${dec.context}</div>
                    <div class="challenge-action">
                        <div class="action-label">→ Ação necessária</div>
                        <div class="action-text">${dec.action}</div>
                        <div class="action-meta">Responsável: ${dec.responsible}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderDate() {
            const dateDiv = document.getElementById('headerDate');
            dateDiv.innerHTML = `<span>${dashboardData.lastUpdated}</span>`;
            document.getElementById('lastUpdated').textContent = `Última atualização: ${dashboardData.lastUpdated} | Próxima atualização: Próxima terça-feira às 9h`;
        }

        window.addEventListener('load', () => {
            renderPositions();
            renderDecisions();
            renderDate();
        });
    </script>
</body>
</html>
